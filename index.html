<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#f2eee3">
  <meta name="application-name" content="Môj prírodný svet">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Môj prírodný svet">
  <title>Môj prírodný svet</title>
  <script>
    (function () {
      const root = document.documentElement;
      root.dataset.appStartupStartedAt = String(Date.now());
      root.classList.add("app-startup-stable");
      try {
        if (window.innerWidth <= 760) {
          root.classList.add("app-startup-mobile-shell");
        }
      } catch (error) {
        // Startup class helper nesmie blokovať načítanie appky.
      }
    }());
  </script>
  <link rel="manifest" href="manifest.webmanifest?v=2026-04-04-0077">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2026-04-04-0077">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2026-04-04-0077">
  <link rel="stylesheet" href="styles.css?v=2026-04-16-0003">
  <link rel="stylesheet" href="weatherBackground.css?v=2026-04-05-0129">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero__overlay"></div>
      <div class="hero__content hero__content--with-weather">
        <div class="hero__text">
          <h1>Môj prírodný svet</h1>
        </div>
        <!-- Horný weather pill je zámerne odstránený.
             Túto vrstvu budeme skladať nanovo neskôr od čistého stavu. -->
        <div class="hero__weather" aria-live="polite">
          <div id="hero-weather-mini" class="main-menu-weather-mini main-menu-weather-mini--hero"></div>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="mobile-sky-weather-pill" aria-live="polite">
        <div id="mobile-sky-weather-mini" class="main-menu-weather-mini main-menu-weather-mini--hero"></div>
      </div>

      <section class="utility-bar utility-bar--floating-home">
        <div class="menu-toolbar">
          <div class="menu-toolbar__left">
            <button class="button button--toolbar-home" id="open-main-menu" type="button" hidden>Hlavné menu</button>
          </div>
          <div class="menu-toolbar__center">
            <div class="menu-toolbar__group menu-toolbar__group--primary">
              <details class="toolbar-add-menu" id="toolbar-add-menu">
                <summary class="button button--toolbar-add toolbar-add-menu__summary">Pridať</summary>
                <div class="toolbar-add-menu__panel">
                  <button class="button button--ghost toolbar-add-menu__action" id="open-add-entry" type="button">Pridať moment</button>
                  <button class="button button--ghost toolbar-add-menu__action" id="open-add-card" type="button">Pridať kartu</button>
                  <button class="button button--ghost toolbar-add-menu__action" id="open-add-gallery" type="button">Pridať galériu</button>
                  <button class="button button--ghost toolbar-add-menu__action" id="open-add-category" type="button">Pridať kategóriu</button>
                  <button class="button button--ghost toolbar-add-menu__action toolbar-add-menu__action--batch" id="open-batch-sowing" type="button" hidden>Hromadný výsev</button>
                  <button class="button button--ghost toolbar-add-menu__action toolbar-add-menu__action--batch" id="open-batch-move" type="button" hidden>Hromadný presun kariet</button>
                </div>
              </details>
              <button class="button button--ghost button--toolbar-utility" id="toggle-worklog-panel" type="button">Plán práce</button>
              <button class="button button--ghost button--toolbar-utility" id="toggle-journal-panel" type="button">Denník</button>
            </div>
          </div>
        </div>
        <div class="utility-bar__settings">
          <div class="menu-toolbar__group menu-toolbar__group--settings" id="menu-toolbar-settings-slot"></div>
        </div>
      </section>

      <section class="panel panel--menu" id="menu-panel">
        <nav id="main-menu" class="main-menu"></nav>
      </section>

      <section class="workspace-layout">
        <div class="workspace-main">
          <section class="panel">
            <div class="panel__header panel__header--catalog is-hidden" id="catalog-header">
              <div class="catalog-toolbar">
                <span class="catalog-toolbar__label">Filtrovanie odrôd</span>
                <span class="catalog-toolbar__context" id="catalog-context">Aktuálna kategória</span>
              </div>
              <details class="filter-disclosure" id="filter-disclosure">
                <summary class="filter-disclosure__summary">
                  <span>Filtre</span>
                  <span class="filter-disclosure__value" id="active-filter-label">Všetko</span>
                </summary>
                <div class="filters filters--compact">
                  <button class="filter is-active" data-filter="all" type="button">Všetko</button>
                  <button class="filter" data-filter="sown" type="button">Vysiate</button>
                  <button class="filter" data-filter="favorite" type="button">Top odrody</button>
                  <button class="filter" data-filter="avoid" type="button">Nechcem ďalší rok</button>
                </div>
              </details>
            </div>
            <div id="catalog" class="catalog-shell"></div>
          </section>
        </div>

        <aside class="workspace-side">
          <section class="panel panel--glass panel--sticky">
            <div class="panel__header">
              <div>
                <h2 id="active-season-title">Sezóna 2026</h2>
              </div>
            </div>

            <article class="season-card season-card--memories">
              <div class="season-card__head">
                <button class="button button--ghost mini-list__more mini-list__more--inline" type="button" id="open-all-journal-from-memories">Zobraziť všetky zápisy</button>
              </div>
              <div id="memory-strip" class="memory-strip"></div>
              <div id="insight-strip" class="insight-strip"></div>
            </article>

            <div id="progress-overview" class="progress-overview"></div>

            <div class="season-grid season-grid--sidebar">
              <article class="season-card">
                <h3>Denník</h3>
                <div id="journal-sidebar" class="mini-list"></div>
              </article>
            </div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <dialog id="detail-modal" class="detail-modal">
    <form method="dialog" class="detail-modal__backdrop">
      <button class="detail-modal__close" type="submit" aria-label="Zavrieť detail">x</button>
    </form>
    <button class="back-button detail-modal__back" id="detail-modal-back" type="button" aria-label="Krok späť">Späť</button>
    <div class="detail-modal__content" id="detail-content"></div>
  </dialog>

  <dialog class="image-lightbox" id="image-lightbox">
    <button class="image-lightbox__close" id="image-lightbox-close" type="button" aria-label="Zavrieť fotku">×</button>
    <button class="back-button image-lightbox__back" id="image-lightbox-back" type="button" aria-label="Krok späť">Späť</button>
    <button class="image-lightbox__nav image-lightbox__nav--prev" id="image-lightbox-prev" type="button" aria-label="Predchádzajúca fotka">&#8249;</button>
    <figure class="image-lightbox__figure">
      <img class="image-lightbox__image" id="image-lightbox-image" src="" alt="">
      <figcaption class="image-lightbox__count" id="image-lightbox-count"></figcaption>
    </figure>
    <button class="image-lightbox__nav image-lightbox__nav--next" id="image-lightbox-next" type="button" aria-label="Ďalšia fotka">&#8250;</button>
  </dialog>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase-config.js?v=2026-03-29-0015"></script>
  <script defer src="weather-state.js?v=2026-04-14-0001"></script>
  <script defer src="weatherBackground.js?v=2026-04-14-0001"></script>
  <script defer src="weatherAudio.js?v=2026-04-14-0001"></script>
  <script defer src="js/constants.js?v=2026-04-09-0003"></script>
  <script defer src="js/seed-data.js?v=2026-04-09-0003"></script>
  <script defer src="js/quick-ui.js?v=2026-04-09-0003"></script>
  <script defer src="js/journal.js?v=2026-04-09-0003"></script>
  <script defer src="js/categories.js?v=2026-04-14-0001"></script>
  <script defer src="js/storage.js?v=2026-04-09-0003"></script>
  <script defer src="js/preferences.js?v=2026-04-10-2357"></script>
  <script defer src="js/data-transfer.js?v=2026-04-11-0003"></script>
  <script defer src="js/weather-location.js?v=2026-04-11-0002"></script>
  <script defer src="js/auth-local.js?v=2026-04-16-0001"></script>
  <script defer src="js/actions.js?v=2026-04-11-0004"></script>
  <script defer src="js/ui.helpers.js?v=2026-04-09-0003"></script>
  <script defer src="js/ui.js?v=2026-04-09-0003"></script>
  <script defer src="app.js?v=2026-04-16-0004"></script>
  <script defer src="pwa.js?v=2026-04-16-0004"></script>
</body>
</html>
